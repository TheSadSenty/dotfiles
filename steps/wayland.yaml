- defaults:
    shell:
      stderr: true
      stdout: true

# niri stuff
- omnipkg:
  - install: [niri, fuzzel, mako, waybar, swaybg, swayidle, swaylock, xdg-desktop-portal-gtk]

- omnipkg:
   - install: [
          { pacman: ly },
      ]

# Other stuff
- omnipkg:
    - install: [keepassxc, firefox, alacritty, kitty]

- shell:
    - command: sudo systemctl enable --now ly.service
      description: Starting Ly daemon
